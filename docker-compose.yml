services:
  # 1. Radiant Node
  node:
    build:
      context: ./node
      dockerfile: Dockerfile
    pull_policy: never
    image: radiant-explorer-node:latest
    container_name: radiant-explorer-node
    restart: unless-stopped
    command:
      - "-server=1"
      - "-printtoconsole"
      - "-txindex=1"
      - "-rpcuser=${RPC_USER:-radiantuser}"
      - "-rpcpassword=${RPC_PASS:-radiantpassword}"
      - "-rpcworkqueue=${RPC_WORKQUEUE:-1024}"
      - "-rpcthreads=${RPC_THREADS:-256}"
      - "-rpcbind=0.0.0.0"
      - "-rpcallowip=0.0.0.0/0"
    volumes:
      - node-data:/root/.radiant
    networks:
      - radiant-explorer-net

  # 2. PostgreSQL Database
  postgres:
    image: postgres:18.1-alpine
    container_name: radiant-explorer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-radiant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radiant123}
      POSTGRES_DB: ${POSTGRES_DB:-radiantdb}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U radiant -d radiantdb" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - radiant-explorer-net

  # 3. Syncer Service (Rust)
  syncer:
    image: radiant-explorer-syncer:latest
    build:
      context: ./syncer
      dockerfile: Dockerfile
    container_name: radiant-explorer-syncer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      node:
        condition: service_started
    environment:
      RPC_HOST: node
      RPC_PORT: 7332
      RPC_USER: ${RPC_USER:-radiantuser}
      RPC_PASS: ${RPC_PASS:-radiantpassword}
      DATABASE_URL: postgresql://${POSTGRES_USER:-radiant}:${POSTGRES_PASSWORD:-radiant123}@postgres:5432/${POSTGRES_DB:-radiantdb}
      RUST_LOG: info,sqlx=warn,reqwest=warn
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - radiant-explorer-net
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 2G

  # 4. Frontend (Next.js) + Tailwind CSS
  frontend:
    image: radiant-explorer-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: radiant-explorer-frontend
    restart: unless-stopped
    ports:
      - "3333:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-radiant}:${POSTGRES_PASSWORD:-radiant123}@postgres:5432/${POSTGRES_DB:-radiantdb}
      # Maintaining the original environment variable name just in case the frontend still expects it, but updated the port to 7332
      NEURAI_RPC_URL: http://node:7332
      NEURAI_RPC_USER: ${RPC_USER:-radiantuser}
      NEURAI_RPC_PASSWORD: ${RPC_PASS:-radiantpassword}
      
      # Also providing it as RADIANT just in case it has been updated
      RADIANT_RPC_URL: http://node:7332
      RADIANT_RPC_USER: ${RPC_USER:-radiantuser}
      RADIANT_RPC_PASSWORD: ${RPC_PASS:-radiantpassword}
    depends_on:
      postgres:
        condition: service_healthy
      node:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - radiant-explorer-net

networks:
  radiant-explorer-net:
    driver: bridge

volumes:
  node-data:
  pg-data:
